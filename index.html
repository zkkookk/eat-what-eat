<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线文档阅读器</title>
<style>
  body {
    font-family: "苹方", sans-serif;
    margin: 0; padding: 15px;
    font-size: 16px; line-height: 1.9;
    background-color: #fffbe6; color: #333;
    -webkit-font-smoothing: antialiased;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  /* 取消首行缩进 */
  #reader {
    white-space: pre-wrap; margin-top: 10px;text-indent: 2em;
  }
  #pageReader {
    margin-top: 10px;
    min-height: 80vh;
    white-space: pre-wrap;
  }
  #controls {
    position: fixed; bottom: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between; gap: 6px;
    transition: opacity 0.3s;
    font-size: 13px;
    flex-wrap: wrap;
  }
  #progress {
    position: fixed; top: 5px; right: 10px; font-size: 14px; color: #666;
  }
  #pageInfo {
    position: fixed; top: 5px; left: 10px; font-size: 14px; color: #666;
  }
  #toc {
    position: fixed; right: 5px; top: 50px; background: #fffbe6;
    border: 1px solid #ccc; padding: 10px;
    max-height: 80%; overflow-y: auto; z-index: 1000;
    display: none;
  }
  #toc span { display: block; cursor: pointer; margin-bottom: 5px; }
  button {
    padding: 5px 10px; border-radius: 4px; border: none;
    background: #f0c14b; color: #000; font-size: 13px;
  }
  input[type="file"] { display: none; }
  /* 翻页点击区域 */
  .page-wrap {
    width: 100%;
    height: 85vh;
    position: relative;
  }
  .page-left, .page-right {
    position: absolute;
    top: 0;
    width: 45%;
    height: 100%;
  }
  .page-left { left: 0; }
  .page-right { right: 0; }
</style>
</head>
<body>

<h2>文档阅读器</h2>
<label for="fileInput" style="background:#f0c14b;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:13px;">选择</label>
<input type="file" id="fileInput" accept=".txt,.docx">

<div id="reader">请选择 TXT 或 DOCX 文档开始阅读...</div>
<div id="pageReader" style="display:none;"></div>

<div id="toc"></div>
<div id="progress">0%</div>
<div id="pageInfo">页码 0/0</div>

<div id="controls">
  <button id="inc">A+</button>
  <button id="dec">A-</button>
  <button id="bg">背景</button>
  <button id="night">夜间</button>
  <button id="toggleTOC">目录</button>
  <button id="modeToggle">翻页</button>
  <button id="hideCtrl">-</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>

<script>
let currentFileName = null;
let originFullText = "";
// 翻页变量
let isPageMode = false;
// 动态计算一屏能容纳多少字符
function getPageCharCount() {
    // 阅读可视高度
    const viewHeight = window.innerHeight - 120;
    // 当前字号、行高
    const fs = parseFloat(getComputedStyle(document.body).fontSize);
    const lh = parseFloat(getComputedStyle(document.body).lineHeight);
    // 估算一行字数、总行数
    const lineNum = Math.floor(viewHeight / lh);
    const oneLineChar = Math.floor(window.innerWidth / fs / 1.3);
    return Math.floor(lineNum * oneLineChar);
}
let pageList = [];
let currentPage = 0;

const readerDiv = document.getElementById('reader');
const pageReaderDiv = document.getElementById('pageReader');
const toc = document.getElementById('toc');
const pageInfo = document.getElementById('pageInfo');

// 目录显示/隐藏按钮
document.getElementById('toggleTOC').onclick = () => {
  if(toc.style.display === 'none' || toc.style.display === '') {
    toc.style.display = 'block';
  } else {
    toc.style.display = 'none';
  }
};

// 生成目录
function generateTOC(text) {
  toc.innerHTML = '';
  toc.style.display = 'block';

  let modifiedText = text;
  const chapterRegex = /^\s*(第[一二三四五六七八九十0-9]+章.*|章节[一二三四五六七八九十0-9].*)/gm;
  let match;
  let index = 0;
  while((match = chapterRegex.exec(text)) !== null) {
    const anchorId = 'chapter' + index;
    const chapterTitle = match[0];
    modifiedText = modifiedText.replace(chapterTitle, `<span id='${anchorId}'>${chapterTitle}</span>`);

    const span = document.createElement('span');
    span.textContent = chapterTitle.trim();
    span.style.display='block';
    span.style.cursor='pointer';
    span.style.marginBottom='5px';
    span.onclick = () => {
      const target = document.getElementById(anchorId);
      if(target) window.scrollTo({top: target.offsetTop, behavior: 'smooth'});
    };
    toc.appendChild(span);
    index++;
  }
  return modifiedText;
}

function splitPage(text) {
  pageList = [];
  let start = 0;
  // 动态获取当前屏该放多少字
  let count = getPageCharCount();
  while (start < text.length) {
    let end = start + count;
    // 尽量在换行/标点处截断，不拆词语
    let sub = text.slice(start, end);
    let lastBreak = Math.max(sub.lastIndexOf("\n"), sub.lastIndexOf("，"), sub.lastIndexOf("。"));
    if (lastBreak > count * 0.6) {
        end = start + lastBreak + 1;
    }
    pageList.push(text.slice(start, end));
    start = end;
  }
  currentPage = 0;
}

// 渲染当前页
function renderPage() {
  if(pageList.length === 0) return;
  pageInfo.innerText = `页码 ${currentPage+1}/${pageList.length}`;
  pageReaderDiv.innerHTML = `
    <div class="page-wrap">
      <div class="page-left" id="prevPageBtn"></div>
      <div class="page-right" id="nextPageBtn"></div>
      <div style="padding:0 10px;">${pageList[currentPage]}</div>
    </div>
  `;
  // 绑定翻页点击
  document.getElementById('prevPageBtn').onclick = goPrevPage;
  document.getElementById('nextPageBtn').onclick = goNextPage;
}

function goPrevPage() {
  if(currentPage > 0) {
    currentPage--;
    renderPage();
    savePagePos();
  }
}
function goNextPage() {
  if(currentPage < pageList.length - 1) {
    currentPage++;
    renderPage();
    savePagePos();
  }
}

// 模式切换
document.getElementById('modeToggle').onclick = ()=>{
  isPageMode = !isPageMode;
  if(isPageMode){
    readerDiv.style.display = 'none';
    pageReaderDiv.style.display = 'block';
    splitPage(originFullText);
    // 恢复记忆页码
    let savedPage = localStorage.getItem('page_'+currentFileName);
    if(savedPage) currentPage = parseInt(savedPage);
    renderPage();
  }else{
    readerDiv.style.display = 'block';
    pageReaderDiv.style.display = 'none';
    restoreScroll();
  }
};

// 读取文件
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  currentFileName = file.name;
  if(file.name.endsWith('.txt')) {
    const fr = new FileReader();
    fr.onload = ()=> {
      originFullText = fr.result;
      let htmlText = generateTOC(originFullText);
      readerDiv.innerHTML = htmlText;
      restoreScroll();
    };
    fr.readAsText(file, 'utf-8');
  } else if(file.name.endsWith('.docx')) {
    const fr = new FileReader();
    fr.onload = () => {
      mammoth.extractRawText({arrayBuffer: fr.result})
        .then(res => { 
          originFullText = res.value;
          let htmlText = generateTOC(originFullText);
          readerDiv.innerHTML = htmlText; 
          restoreScroll(); 
        })
        .catch(()=> alert('DOCX 解析失败'));
    };
    fr.readAsArrayBuffer(file);
  } else alert('只支持 TXT/DOCX');
});

// 字体调节
const body = document.body;
document.getElementById('inc').onclick = ()=> {
  body.style.fontSize = (parseInt(getComputedStyle(body).fontSize) + 2) + 'px';
  document.querySelectorAll('button, label').forEach(el=> el.style.fontSize = parseInt(getComputedStyle(el).fontSize)+2+'px');
  // 字号改变后，重新自适应分页
if(isPageMode && originFullText){
    splitPage(originFullText);
    renderPage();
}
};
document.getElementById('dec').onclick = ()=> {
  body.style.fontSize = (parseInt(getComputedStyle(body).fontSize) - 2) + 'px';
  document.querySelectorAll('button, label').forEach(el=> el.style.fontSize = parseInt(getComputedStyle(el).fontSize)-2+'px');
  // 字号改变后，重新自适应分页
if(isPageMode && originFullText){
    splitPage(originFullText);
    renderPage();
}
};

// 背景切换
let bgIndex = 0;
const backgrounds = ['#fffbe6','#ffffff'];
document.getElementById('bg').onclick = ()=> { 
  bgIndex = (bgIndex+1) % backgrounds.length; 
  body.style.backgroundColor = backgrounds[bgIndex]; 
  body.style.color='#333'; 
};

// 夜间模式
let night = false;
document.getElementById('night').onclick = ()=> { 
  night=!night; 
  if(night) { 
    body.style.backgroundColor='#1c1c1c'; 
    body.style.color='#ddd'; 
  } else { 
    body.style.backgroundColor=backgrounds[bgIndex]; 
    body.style.color='#333'; 
  } 
};

// 阅读百分比
const progressDiv = document.getElementById('progress');
window.addEventListener('scroll', ()=> { 
  if(!isPageMode){
    const percent = Math.min(100, Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100)); 
    progressDiv.innerText = percent + '%'; 
  }
});

// 滚动隐藏工具栏
const controls = document.getElementById('controls');
let hideTimeout;
window.addEventListener('scroll', ()=> { 
  controls.style.opacity = '0'; 
  clearTimeout(hideTimeout); 
  hideTimeout = setTimeout(()=> { controls.style.opacity='1'; }, 1000); 
});

// 保存滚动位置
let scrollSaveTimeout;
window.addEventListener('scroll', () => { 
  clearTimeout(scrollSaveTimeout); 
  scrollSaveTimeout = setTimeout(() => { 
    if(currentFileName && !isPageMode) { 
      localStorage.setItem('scrollPos_' + currentFileName, window.scrollY); 
    } 
  }, 500); 
});

// 保存页码
function savePagePos(){
  if(currentFileName){
    localStorage.setItem('page_'+currentFileName, currentPage);
  }
}
  
// 手动隐藏/显示控制栏
document.getElementById('hideCtrl').onclick = function(){
    if(controls.style.opacity === '0'){
        controls.style.opacity = '1';
        this.innerText = '隐藏栏';
    }else{
        controls.style.opacity = '0';
        this.innerText = '显示栏';
    }
};
  
// 恢复阅读位置
function restoreScroll() { 
  if(currentFileName) { 
    const pos = localStorage.getItem('scrollPos_' + currentFileName); 
    if(pos) window.scrollTo(0, parseInt(pos)); 
  }
  // 顺便恢复页码
  let savedPage = localStorage.getItem('page_'+currentFileName);
  if(savedPage) currentPage = parseInt(savedPage);
}
</script>

</body>
</html>
