<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Read</title>
<style>
:root{--bg:#fff;--text:#000}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system;overflow:hidden}
.dark{--bg:#111;--text:#eee}
#reader{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
.page{max-width:700px;line-height:1.8;font-size:18px;transition:transform .3s}

/* 翻页动画 */
.page.slide-left{transform:translateX(-100%);opacity:0}
.page.slide-right{transform:translateX(100%);opacity:0}

/* 顶部阅读进度 */
#progress{
 position:fixed;
 top:0;
 left:0;
 right:0;
 text-align:center;
 font-size:12px;
 padding-top:env(safe-area-inset-top);
 color:rgba(255,255,255,0.7);
 pointer-events:none;
}
.dark #progress{color:rgba(255,255,255,0.7)}

#menu{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);color:#fff;padding:10px;display:flex;flex-wrap:wrap;transform:translateY(100%);transition:.3s}
#menu.show{transform:translateY(0)}
button,input{margin:5px}
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".txt" style="position:fixed;top:10px;left:10px;z-index:10">
<div id="progress"></div>
<div id="reader"><div class="page" id="page"></div></div>

<div id="menu">
<button onclick="toggleMode()">夜间</button>
字体<input type="range" min="14" max="30" onchange="setFont(this.value)">
行距<input type="range" min="1.2" max="3" step="0.1" onchange="setLine(this.value)">
</div>

<script>
let content='',pages=[],currentPage=0,fontSize=18,lineHeight=1.8,bookName='';
const pageEl=document.getElementById('page');
const progressEl=document.getElementById('progress');

fileInput.onchange=e=>{
 const file=e.target.files[0];
 bookName=file.name.replace('.txt','');
 const reader=new FileReader();
 reader.onload=()=>{content=reader.result;paginate();loadProgress();render();}
 reader.readAsText(file,'utf-8');
}

function paginate(){
 pages=[];
 const temp=document.createElement('div');
 temp.style.position='absolute';temp.style.visibility='hidden';
 temp.style.width=pageEl.clientWidth+'px';
 temp.style.fontSize=fontSize+'px';
 temp.style.lineHeight=lineHeight;
 document.body.appendChild(temp);

 let text=content.split(/\n+/),pageText='';
 text.forEach(line=>{
  let test=pageText+'<p>'+line+'</p>';
  temp.innerHTML=test;
  if(temp.offsetHeight>window.innerHeight*0.9){
   pages.push(pageText);
   pageText='<p>'+line+'</p>';
  }else pageText=test;
 });
 pages.push(pageText);
 document.body.removeChild(temp);
}

function updateProgress(){
 if(pages.length===0) return;
 let percent=Math.floor((currentPage+1)/pages.length*100);
 progressEl.textContent = percent + '%';
}

function render(dir){
 if(dir==='next') pageEl.classList.add('slide-left');
 if(dir==='prev') pageEl.classList.add('slide-right');

 setTimeout(()=>{
  pageEl.classList.remove('slide-left','slide-right');
  pageEl.innerHTML=pages[currentPage]||'';
  updateProgress();
 },150);
 saveProgress();
}

function nextPage(){
 if(currentPage<pages.length-1){currentPage++;render('next');}
}
function prevPage(){
 if(currentPage>0){currentPage--;render('prev');}
}

// 点击区域
document.body.addEventListener('click',e=>{
 const x=e.clientX,w=window.innerWidth;
 if(x<w*0.3) prevPage();
 else if(x>w*0.7) nextPage();
 else toggleMenu();
});

// 滑动支持
let startX=0;
document.body.addEventListener('touchstart',e=>startX=e.touches[0].clientX);
document.body.addEventListener('touchend',e=>{
 let dx=e.changedTouches[0].clientX-startX;
 if(dx>50) prevPage();
 if(dx<-50) nextPage();
});

function toggleMenu(){menu.classList.toggle('show')}

function toggleMode(){
 document.body.classList.toggle('dark');
 localStorage.setItem('dark',document.body.classList.contains('dark'));
}
function setFont(v){fontSize=v;localStorage.setItem('font',v);paginate();render()}
function setLine(v){lineHeight=v;localStorage.setItem('line',v);paginate();render()}

function saveProgress(){localStorage.setItem('page_'+bookName,currentPage)}
function loadProgress(){let p=localStorage.getItem('page_'+bookName);if(p)currentPage=parseInt(p)}

window.onload=()=>{
 if(localStorage.getItem('dark')==='true')document.body.classList.add('dark');
 if(localStorage.getItem('font'))fontSize=localStorage.getItem('font');
 if(localStorage.getItem('line'))lineHeight=localStorage.getItem('line');
}
</script>

</body>
</html>
